<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <rect width="32" height="32" rx="8" fill="#0a0a0b" />
    <circle cx="10" cy="16" r="3" fill="#7c5cff">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="16" cy="16" r="3" fill="#7c5cff" opacity="0.6">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="22" cy="16" r="3" fill="#7c5cff" opacity="0.3">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" begin="0.7s" />
    </circle>
</svg>
